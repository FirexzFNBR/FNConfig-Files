[TestDataService]
BaseURL="https://test-data-service.cdbb.dev.use1a.on.epicgames.com"
GetAccountsURL="/v1/pool/setAccountInUse"
ResetAccountsURL="/v1/account/resetAccounts"
DeleteAccountsURL="/v1/account/accounts"
ReturnAccountsURL="/v1/pool/setPoolInformation"
GenerateExchangeCodeURL="/v1/account/`account_id/exchange_code"
HttpRetryLimit=5
HttpRetryLimitForConnectionError=5
HttpRetryTimeout=60
!HttpRetryResponseCodes=ClearArry
+HttpRetryResponseCodes=408
+HttpRetryResponseCodes=429
+HttpRetryResponseCodes=500
+HttpRetryResponseCodes=502
+HttpRetryResponseCodes=503
+HttpRetryResponseCodes=504
!HttpRetryVerbs=ClearArry
+HttpRetryVerbs=Get
+HttpRetryVerbs=Post
+HttpRetryVerbs=Delete
